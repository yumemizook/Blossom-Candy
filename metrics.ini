; Blossom Candy Theme - Metrics Configuration
; StepMania 5.1

[Common]
InitialScreen="ScreenTitleMenu"
[Global]
FallbackTheme=_fallback

[BCScreenWithMenuElements]
Fallback="ScreenWithMenuElements"
ShowHeader=false
ShowFooter=false

[ScreenTitleMenu]
Fallback="BCScreenWithMenuElements"
NextScreen="ScreenProfileLoad"
ChoiceNames="Play,Options,Exit"
ChoicePlay="applydefaultoptions;screen,ScreenProfileLoad"
ChoiceOptions="screen,ScreenOptionsService"
ChoiceExit="screen,ScreenExit"
ShowFooter=false
MorePage1X=SCREEN_CENTER_X
MorePage1Y=SCREEN_CENTER_Y
ExplanationPage1X=SCREEN_CENTER_X
ExplanationPage1Y=SCREEN_CENTER_Y+100
MorePage2X=SCREEN_CENTER_X
MorePage2Y=SCREEN_CENTER_Y
ExplanationPage2X=SCREEN_CENTER_X
ExplanationPage2Y=SCREEN_CENTER_Y+100
ScrollMenuChoice="none"

[ScreenSelectMusic]
PrevScreen="ScreenTitleMenu"
NextScreen="ScreenPlayerOptions"
NextOptionsScreen="ScreenPlayerOptions"
AllowBack=true
ShowFooter=false
InitCommand=lua,BCProfile:ApplyPlayerOptionsFromConfig(PLAYER_1)

MusicWheelX=SCREEN_WIDTH-355
MusicWheelY=SCREEN_CENTER_Y
MusicWheelOnCommand=diffusealpha,0;decelerate,0.3;diffusealpha,1

[MusicWheel]
FadeSeconds=0.2
SwitchSeconds=0.1
NumWheelItems=15
ItemTransformFunction=function(self,offsetFromCenter,itemIndex,numItems) self:x(0); self:y(offsetFromCenter*44); end
ScrollBarHeight=SCREEN_HEIGHT
ScrollBarOnCommand=visible,false;

[MusicWheelItem]
SectionExpandedX=0
SectionExpandedY=0
SectionExpandedOnCommand=visible,false
SectionExpandedSetCommand=visible,false

SectionCollapsedX=0
SectionCollapsedY=0
SectionCollapsedOnCommand=visible,false
SectionCollapsedSetCommand=visible,false

SortX=0
SortY=0
SortOnCommand=visible,false
SortSetCommand=visible,false

SongNameX=0
SongNameY=0
SongNameOnCommand=visible,false
SongNameSetCommand=visible,false

RouletteX=0
RouletteY=0
RouletteOnCommand=visible,false
RouletteSetCommand=visible,false

RandomX=0
RandomY=0
RandomOnCommand=visible,false
RandomSetCommand=visible,false

PortalX=0
PortalY=0
PortalOnCommand=visible,false
PortalSetCommand=visible,false

CourseNameX=0
CourseNameY=0
CourseNameOnCommand=visible,false
CourseNameSetCommand=visible,false

GroupX=0
GroupY=0
GroupOnCommand=visible,false
GroupSetCommand=visible,false

BannerX=0
BannerY=0
BannerOnCommand=visible,false
BannerSetCommand=visible,false

GradeX=0
GradeY=0
GradeOnCommand=visible,false
GradeSetCommand=visible,false

[ScreenGameplay]
PrevScreen="ScreenPlayerOptions"
NextScreen="ScreenEvaluation"
ShowHeader=false
ShowFooter=false
AllowBack=true
OffCommand=lua,BCProfile:SavePlayerOptionsToConfig(PLAYER_1);lua,BCProfile:SaveProfile(PLAYER_1)

[ScreenEvaluation]
Fallback="BCScreenWithMenuElements"
PrevScreen="ScreenGameplay"
NextScreen="ScreenSelectMusic"
ShowHeader=false
ShowFooter=false
AllowBack=true

[ScreenProfileSave]
Class="ScreenProfileSave"
Fallback="ScreenWithMenuElementsBlank"
NextScreen="ScreenSelectMusic"
PrevScreen="ScreenSelectMusic"
TimerSeconds=-1

[ScreenOptionsService]
PrevScreen="ScreenTitleMenu"
NextScreen="ScreenTitleMenu"
ShowFooter=false

[ScreenOptionsTheme]
Fallback="ScreenOptionsServiceChild"
NextScreen="ScreenOptionsService"
PrevScreen="ScreenOptionsService"
LineNames=""
ShowFooter=false

[ScreenExit]
PrevScreen="ScreenTitleMenu"
NextScreen="ScreenTitleMenu"
ShowFooter=false

[ScreenOptionsMaster]
Fallback="ScreenOptions"
LineNames="Speed,Accel,Effect,Appearance,Turn,Insert,Scroll,NoteSkins,HoldNotes,Mines,Filter,Background,Perspective,Position,ScoreType,Goal,Hide,Data,Steps,Characters"
LineSpeed="list,Speed"
LineAccel="list,Accel"
LineEffect="list,Effect"
LineAppearance="list,Appearance"
LineTurn="list,Turn"
LineInsert="list,Insert"
LineScroll="list,Scroll"
LineNoteSkins="list,NoteSkins"
LineHoldNotes="list,HoldNotes"
LineMines="list,Mines"
LineFilter="list,Filter"
LineBackground="list,Background"
LinePerspective="list,Perspective"
LinePosition="list,Position"
LineScoreType="list,ScoreType"
LineGoal="list,Goal"
LineHide="list,Hide"
LineData="list,Data"
LineSteps="list,Steps"
LineCharacters="list,Characters"

[ScreenPlayerOptions]
Fallback="ScreenOptionsMaster"
PrevScreen="ScreenSelectMusic"
NextScreen="ScreenGameplay"
ShowFooter=false

[ScreenProfileLoad]
Fallback="BCScreenWithMenuElements"
PrevScreen="ScreenTitleMenu"
NextScreen="ScreenSelectMusic"
ShowHeader=false
ShowFooter=false
TimerSeconds=-1
LoadEdits=true
AllowBack=true

[Player]
JudgeScale=1.0
ComboOnRolls=false

[GameState]
AllowMultipleHighScoreWithSameName=true

[ScreenSystemLayer]
CreditsTextOnCommand=visible,false
MemoryCardDisplayP1OnCommand=visible,false
MemoryCardDisplayP2OnCommand=visible,false
HelpDisplayOnCommand=visible,false
