; Blossom Candy Theme - Metrics Configuration
; StepMania 5.1

[Common]
InitialScreen="ScreenTitleMenu"
[Global]
FallbackTheme=_fallback

[ScreenWithMenuElements]
ShowHeader=false
ShowFooter=false

[ScreenTitleMenu]
Fallback="ScreenWithMenuElements"
NextScreen="ScreenSelectMusic"
ChoiceNames="1,2,3"
Choice1="screen,ScreenSelectMusic"
Choice2="screen,ScreenOptions"
Choice3="screen,ScreenExit"
ShowFooter=false
MorePage1X=SCREEN_CENTER_X
MorePage1Y=SCREEN_CENTER_Y
ExplanationPage1X=SCREEN_CENTER_X
ExplanationPage1Y=SCREEN_CENTER_Y+100
MorePage2X=SCREEN_CENTER_X
MorePage2Y=SCREEN_CENTER_Y
ExplanationPage2X=SCREEN_CENTER_X
ExplanationPage2Y=SCREEN_CENTER_Y+100
ScrollMenuChoice="none"

[ScreenSelectMusic]
PrevScreen="ScreenTitleMenu"
NextScreen="ScreenGameplay"
NextOptionsScreen="ScreenGameplay"
AllowBack=true

MusicWheelX=SCREEN_WIDTH-350
MusicWheelY=SCREEN_CENTER_Y-2
MusicWheelOnCommand=x,SCREEN_WIDTH+350;smooth,0.3;x,SCREEN_WIDTH-350;
MusicWheelOffCommand=smooth,0.3;x,SCREEN_WIDTH+350;

MusicWheelOnCommand=diffusealpha,0;decelerate,0.3;diffusealpha,1

[MusicWheel]
FadeSeconds=0.2
SwitchSeconds=0.1
NumWheelItems=14
ItemTransformFunction=function(self,offsetFromCenter,itemIndex,numItems) self:x(0); self:y(offsetFromCenter*44); end
ScrollBarHeight=SCREEN_HEIGHT
ScrollBarOnCommand=visible,false;

[MusicWheelItem]
SectionExpandedX=0
SectionExpandedY=0
SectionExpandedOnCommand=visible,false
SectionExpandedSetCommand=visible,false

SectionCollapsedX=0
SectionCollapsedY=0
SectionCollapsedOnCommand=visible,false
SectionCollapsedSetCommand=visible,false

SortX=0
SortY=0
SortOnCommand=visible,false
SortSetCommand=visible,false

SongNameX=0
SongNameY=0
SongNameOnCommand=visible,false
SongNameSetCommand=visible,false

RouletteX=0
RouletteY=0
RouletteOnCommand=visible,false
RouletteSetCommand=visible,false

RandomX=0
RandomY=0
RandomOnCommand=visible,false
RandomSetCommand=visible,false

PortalX=0
PortalY=0
PortalOnCommand=visible,false
PortalSetCommand=visible,false

CourseNameX=0
CourseNameY=0
CourseNameOnCommand=visible,false
CourseNameSetCommand=visible,false

GroupX=0
GroupY=0
GroupOnCommand=visible,false
GroupSetCommand=visible,false

BannerX=0
BannerY=0
BannerOnCommand=visible,false
BannerSetCommand=visible,false

GradeX=0
GradeY=0
GradeOnCommand=visible,false
GradeSetCommand=visible,false

[ScreenGameplay]
PrevScreen="ScreenSelectMusic"
NextScreen="ScreenEvaluation"
ShowHeader=false
ShowFooter=false
AllowBack=true

[ScreenEvaluation]
Fallback="ScreenWithMenuElements"
PrevScreen="ScreenGameplay"
NextScreen="ScreenSelectMusic"
ShowHeader=false
ShowFooter=false
AllowBack=true

[ScreenOptions]
Fallback="ScreenOptionsService"
PrevScreen="ScreenSelectMusic"
NextScreen="ScreenSelectMusic"

[ScreenExit]
PrevScreen="ScreenTitleMenu"
NextScreen="ScreenTitleMenu"

[ScreenOptionsMaster]
ScreenSelectMusic=ScreenSelectMusic
ScreenOptions=ScreenOptions
ScreenExit=ScreenExit

[Player]
JudgeScale=1.0
ComboOnRolls=false

[GameState]
AllowMultipleHighScoreWithSameName=true
